env:
  DATABASE_URL: "postgresql+asyncpg://realtime_voice:REPLACE_ME@postgresdb-postgresql.postgresdb.svc.cluster.local:5432/realtime_voice"
  SESSION_STORAGE_ROOT: /data/realtime-sessions
  SESSION_TTL_HOURS: "12"
  # ============================================================
  # ASR model configuration for transcription
  # ============================================================
  WHISPER_BASE_URL: MLIS_MODEL_ENDPOINT/v1
  WHISPER_API_KEY: MLIS_MODEL_API_KEY
  WHISPER_MODEL: openai/whisper-large-v3-turbo
  # ============================================================
  # LLM model configuration for translation
  # ============================================================
  LLM_BASE_URL: MLIS_MODEL_ENDPOINT/v1
  LLM_API_KEY: MLIS_MODEL_API_KEY
  LLM_MODEL: Qwen/Qwen3-30B-A3B-Instruct-2507-FP8
  # ============================================================
  # Fact checking setup
  # ============================================================
  FACT_CHECK_ENABLED: "true"
  FACT_CHECK_MODEL: Qwen/Qwen3-30B-A3B-Instruct-2507-FP8
  FACT_CHECK_MAX_SOURCES: "3"
  TRANSCRIPT_FINAL_HOLD_MS: "3000"
  TAVILY_API_KEY: ""

persistence:
  enabled: true
  storageClass: gl4f-filesystem
  accessMode: ReadWriteMany
  size: 100Gi
  mountPath: /data/realtime-sessions
  existingClaim: ""
  annotations: {}

migration:
  enabled: true
  backoffLimit: 3
  activeDeadlineSeconds: 600
  hookDeletePolicy: before-hook-creation,hook-succeeded
  
# ============================================================
# Application image
# ============================================================
images:
  backend:
    repository: "fcaliva/realtime-voice-translation"
    pullPolicy: "IfNotPresent"
    tag: "0.4.0"

  frontend:
    repository: "fcaliva/realtime-voice-translation-fe"
    pullPolicy: "IfNotPresent"
    tag: "0.4.0"

resources:
  backend:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "4"
      memory: "12Gi"

  frontend:
    requests:
      cpu: "50m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

service:
  backendPort: 8000
  frontendPort: 80

# ============================================================
# EZUA settings
# ============================================================
ezua:
  domainName: "${DOMAIN_NAME}"
  virtualService:
    endpoint: "realtime-voice-translator.${DOMAIN_NAME}"
    istioGateway: "istio-system/ezaf-gateway"

certificatesPolicy:
  enabled: false

  env:
    - name: SSL_CERT_DIR
      value: /etc/ssl/certs
    - name: REQUESTS_CA_BUNDLE
      value: /tmp/certs/ca-certificates.crt
    - name: SSL_CERT_FILE
      value: /tmp/certs/ca-certificates.crt
    - name: AIOHTTP_CLIENT_SESSION_SSL
      value: /tmp/certs/ca-certificates.crt
    - name: CURL_CA_BUNDLE
      value: /tmp/certs/ca-certificates.crt

  initContainer:
    image: alpine:3.20
    command:
      - /bin/sh
      - -c
      - |
        set -e
        if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
          cp /etc/ssl/certs/ca-certificates.crt /work/ca-certificates.crt
        elif [ -f /etc/ssl/certs/ca-bundle.crt ]; then
          cp /etc/ssl/certs/ca-bundle.crt /work/ca-certificates.crt
        else
          echo "No base CA bundle found in init container"
          exit 1
        fi
        cat /config/ezaf-root-ca.crt >> /work/ca-certificates.crt
        echo "" >> /work/ca-certificates.crt

  initVolumeMounts:
    - name: combined-certs
      mountPath: /work
    - name: ezaf-root-ca
      mountPath: /config/ezaf-root-ca.crt
      subPath: ca-certificates.crt
      readOnly: true

  volumeMounts:
    - name: combined-certs
      mountPath: /tmp/certs
      readOnly: false

  volumes:
    - name: combined-certs
      emptyDir: {}
    - name: ezaf-root-ca
      configMap:
        name: ezaf-root-ca
        items:
          - key: ezaf-root-ca.crt
            path: ca-certificates.crt
