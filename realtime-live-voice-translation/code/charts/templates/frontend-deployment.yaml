apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-translate-frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        fsGroup: 101
      containers:
        - name: frontend
          image: "{{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "{{ .Values.resources.frontend.requests.cpu }}"
              memory: "{{ .Values.resources.frontend.requests.memory }}"
            limits:
              cpu: "{{ .Values.resources.frontend.limits.cpu }}"
              memory: "{{ .Values.resources.frontend.limits.memory }}"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
