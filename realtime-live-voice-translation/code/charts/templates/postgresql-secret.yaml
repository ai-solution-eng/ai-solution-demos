{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "realtime-translation.fullname" . }}-postgresql
  labels:
    app: postgresql
type: Opaque
stringData:
  postgres-password: "{{ .Values.postgresql.auth.postgresPassword }}"
  database-user: "{{ .Values.postgresql.auth.username }}"
  database-password: "{{ .Values.postgresql.auth.password }}"
{{- end }}
