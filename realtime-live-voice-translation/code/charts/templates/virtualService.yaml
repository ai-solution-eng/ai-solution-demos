apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: realtime-voice-translation
  labels:
    hpe-ezua/type: app-service-user
spec:
  hosts:
    - {{ .Values.ezua.virtualService.endpoint | required "\nValid .Values.ezua.virtualService.endpoint is required !" }}
  gateways:
    - {{ .Values.ezua.virtualService.istioGateway }}
  http:
    - match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: backend
            port:
              number: {{ .Values.service.backendPort }}

    - match:
        - uri:
            prefix: /ws/translate
      route:
        - destination:
            host: backend
            port:
              number: {{ .Values.service.backendPort }}

    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: frontend
            port:
              number: {{ .Values.service.frontendPort }}