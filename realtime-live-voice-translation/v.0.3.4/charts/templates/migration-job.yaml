{{- if and .Values.migration.enabled .Values.env.DATABASE_URL }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "realtime-translation.fullname" . }}-migration
  labels:
    app: backend
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": {{ .Values.migration.hookDeletePolicy | quote }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app: backend
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy | default "IfNotPresent" }}
          command:
            - python3
            - -m
            - alembic
            - upgrade
            - head
          env:
{{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
{{- end }}
{{- end }}
