env:
  DEVICE: "cpu"
  HF_TOKEN: hf_TOKEN

# ============================================================
# Proxy configuration (for clusters behind corporate proxy)
# ============================================================
# Set proxy.enabled to true to enable proxy settings for the user container.
# The init container will also inherit these settings.
proxy:
  enabled: true
  env:
    - name: HTTP_PROXY
      value: http://hpeproxy.its.hpecorp.net:8080
    - name: http_proxy
      value: http://hpeproxy.its.hpecorp.net:8080
    - name: HTTPS_PROXY
      value: http://hpeproxy.its.hpecorp.net:8080
    - name: https_proxy
      value: http://hpeproxy.its.hpecorp.net:8080

no_proxy:
  enabled: true
  env:
    - name: NO_PROXY
      value: .cluster.local,.svc,.svc.cluster,.svc.cluster.local,10.0.0.0/8,10.96.0.1,127.0.0.1,172.0.0.0/8,172.28.1.161,172.28.1.162,172.28.1.61,172.28.1.62,172.28.1.63,172.28.1.81,192.0.0.0/8,kubeapi-d2e14158-5243-4688-93c2-610381d9a46a.external.hpe.local,localhost,pcai-se-ai-application.hst.rdlabs.hpecorp.net,pcai-se-nfs-vip-pool.hst.lab,ai-application.staging.discover.hpepcai.com,prod.lg-pcai.hou,hpecolo.net,.hpecolo.net
    - name: no_proxy
      value: .cluster.local,.svc,.svc.cluster,.svc.cluster.local,10.0.0.0/8,10.96.0.1,127.0.0.1,172.0.0.0/8,172.28.1.161,172.28.1.162,172.28.1.61,172.28.1.62,172.28.1.63,172.28.1.81,192.0.0.0/8,kubeapi-d2e14158-5243-4688-93c2-610381d9a46a.external.hpe.local,localhost,pcai-se-ai-application.hst.rdlabs.hpecorp.net,pcai-se-nfs-vip-pool.hst.lab,ai-application.staging.discover.hpepcai.com,prod.lg-pcai.hou,hpecolo.net,.hpecolo.net

# ============================================================
# Application images
# ============================================================
images:
  backend:
    repository: "fcaliva/biomed-mammal"
    pullPolicy: "IfNotPresent"
    tag: "latest"

  frontend:
    repository: "fcaliva/biomed-ui"
    pullPolicy: "IfNotPresent"
    tag: "latest"

# ============================================================
# Resource limits & requests
# ============================================================
resources:
  backend:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      cpu: "8"
      memory: "16Gi"

  frontend:
    requests:
      cpu: "50m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"

# ============================================================
# Service ports
# ============================================================
service:
  backendPort: 3000
  backendTargetPort: 3000
  frontendPort: 8080
  frontendTargetPort: 8080
  # Override MODEL_URL for the frontend (e.g. "http://host.docker.internal:3000" for local testing).
  # If empty, auto-generates from the backend K8s service name.
  modelUrlOverride: ""

# ============================================================
# EZUA settings
# ============================================================
ezua:
  domainName: "${DOMAIN_NAME}"
  virtualService:
    endpoint: "biomed-mammal.${DOMAIN_NAME}"
    istioGateway: "istio-system/ezaf-gateway"

# ============================================================
# SSL certificates policy
# ============================================================
certificatesPolicy:
  enabled: true

  env:
    - name: SSL_CERT_DIR
      value: /etc/ssl/certs
    - name: REQUESTS_CA_BUNDLE
      value: /tmp/certs/ca-certificates.crt
    - name: SSL_CERT_FILE
      value: /tmp/certs/ca-certificates.crt
    - name: AIOHTTP_CLIENT_SESSION_SSL
      value: /tmp/certs/ca-certificates.crt
    - name: CURL_CA_BUNDLE
      value: /tmp/certs/ca-certificates.crt

  initContainer:
    image: alpine:3.20
    command:
      - /bin/sh
      - -c
      - |
        set -e
        if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
          cp /etc/ssl/certs/ca-certificates.crt /work/ca-certificates.crt
        elif [ -f /etc/ssl/certs/ca-bundle.crt ]; then
          cp /etc/ssl/certs/ca-bundle.crt /work/ca-certificates.crt
        else
          echo "No base CA bundle found in init container"
          exit 1
        fi
        cat /config/ezaf-root-ca.crt >> /work/ca-certificates.crt
        echo "" >> /work/ca-certificates.crt

  initVolumeMounts:
    - name: combined-certs
      mountPath: /work
    - name: ezaf-root-ca
      mountPath: /config/ezaf-root-ca.crt
      subPath: ca-certificates.crt
      readOnly: true

  volumeMounts:
    - name: combined-certs
      mountPath: /tmp/certs
      readOnly: false

  volumes:
    - name: combined-certs
      emptyDir: {}
    - name: ezaf-root-ca
      configMap:
        name: ezaf-root-ca
        items:
          - key: ezaf-root-ca.crt
            path: ca-certificates.crt
