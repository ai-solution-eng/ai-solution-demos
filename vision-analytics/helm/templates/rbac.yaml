apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gradio-vlm-chart.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gradio-vlm-chart.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gradio-vlm-chart.fullname" . }}-isvc-reader
rules:
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gradio-vlm-chart.fullname" . }}-isvc-reader-binding
subjects:
- kind: ServiceAccount
  name: {{ include "gradio-vlm-chart.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "gradio-vlm-chart.fullname" . }}-isvc-reader
  apiGroup: rbac.authorization.k8s.io
