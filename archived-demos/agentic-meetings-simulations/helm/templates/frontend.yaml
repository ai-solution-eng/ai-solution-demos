apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-frontend"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: meetings-frontend
    {{- include "hpe-ezua.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meetings-frontend
  template:
    metadata:
      labels:
        app: meetings-frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image }}"
        ports:
        - containerPort: {{ .Values.frontend.port }}
        env:
        - name: ENV
          value: "{{ .Values.global.env }}"

---
apiVersion: v1
kind: Service
metadata:
  name: meetings-frontend
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: meetings-frontend
    {{- include "hpe-ezua.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: meetings-frontend
  ports:
  - port: 80
    targetPort: {{ .Values.frontend.port }}
